        /* =========================================
           [전체 레이아웃]
           ========================================= */
        body {
            margin: 0; padding: 0;
            background-color: #222;
            color: #333;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            user-select: none;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #333 0%, #111 100%);
            z-index: -2;
        }

        /* --- [헤더 네비게이션] --- */
        .top-header-bar {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 60px;
            background-color: #1a1a1a;
            border-bottom: 4px solid #535353;
            box-shadow: 0 5px 15px rgba(0,0,0,0.9);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 2000;
        }

        .header-logo {
            font-family: 'Black Ops One', cursive;
            font-size: 24px; color: #efefef; text-decoration: none;
            text-shadow: 2px 2px 0px #000; cursor: pointer; letter-spacing: 1px;
        }

        .hamburger-btn {
            background: none; border: none; cursor: pointer; padding: 5px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .hamburger-line {
            width: 30px; height: 4px; background-color: #efefef; border-radius: 2px; transition: 0.3s;
        }
        .hamburger-btn:hover .hamburger-line { background-color: #aaa; }

        .nav-dropdown {
            display: none; position: absolute; top: 60px; right: 0; width: 220px;
            background-color: #222; border: 2px solid #535353; border-top: none;
            box-shadow: 0 10px 20px rgba(0,0,0,1); z-index: 10000;
        }
        .nav-item { 
            display: block; padding: 15px; color: #ccc; text-decoration: none; 
            font-size: 14px; border-bottom: 1px solid #444; font-family: 'Share Tech Mono', monospace;
        }
        .nav-item:hover { background-color: #535353; color: #fff; font-weight: bold; }
        .logout-item { color: #ff6b6b; font-weight: bold; }


        /* --- [신형 자판기 본체] --- */
        .vending-machine {
            margin-top: 100px;
            margin-bottom: 50px;
            width: 90%; max-width: 1000px;
            background: #e0e0e0;
            border: 1px solid #999;
            border-radius: 10px;
            box-shadow: 
                inset 0 0 20px rgba(255,255,255,0.5), 
                10px 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
            position: relative;
            display: flex; flex-direction: column; gap: 20px;
        }

        .machine-top {
            background: #fff; border: 1px solid #ccc; border-radius: 5px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .machine-brand {
            font-size: 24px; font-weight: bold; color: #535353; letter-spacing: -1px; font-style: italic;
        }
        .credit-display {
            background: #222; color: rgb(255, 196, 0);
            font-family: 'VT323', monospace; font-size: 28px;
            padding: 5px 15px; border-radius: 4px;
            border: 2px solid #555; box-shadow: inset 0 0 5px #000;
        }

        .glass-window {
            background: #f0f8ff; border: 10px solid #ccc; border-radius: 5px;
            padding: 20px; box-shadow: inset 0 5px 15px rgba(0,0,0,0.2);
            min-height: 500px; position: relative;
        }
        .glass-window::after {
            content: ""; position: absolute; top: 0; right: 0; width: 40%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg); pointer-events: none;
        }

        .product-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            position: relative; z-index: 1;
            padding-top: 45px;
        }

        .product-slot {
            background: transparent;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px;
            border-bottom: 2px solid #ddd;
        }

        /* [수정] 이미지용 스타일로 변경 */
        .product-icon {
            width: 80px; /* 이미지 너비 */
            height: 80px; /* 이미지 높이 */
            margin-bottom: 10px;
            object-fit: contain; /* 비율 유지하며 칸에 맞춤 */
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3)); /* 그림자 효과 */
            transition: transform 0.2s;
        }
        .product-slot:hover .product-icon { transform: scale(1.1) rotate(5deg); }

        .product-name {
            font-size: 14px; font-weight: bold; color: #333;
            text-align: center; margin-bottom: 5px;
            height: 40px; line-height: 1.2; display: flex; align-items: center;
        }

        /* [수정] 모든 버튼 디자인 (기본: 진회색 -> 호버: 빨강) */
        .buy-btn, .buy-btn.expensive {
            background: #333333; /* 기본: 진한 회색 */
            color: white; 
            border: none; 
            border-radius: 20px;
            padding: 5px 15px; 
            font-size: 14px; 
            font-weight: bold; 
            font-family: 'Noto Sans KR';
            cursor: pointer; 
            
            /* 그림자: 더 어두운 검정 계열 */
            box-shadow: 0 3px 0 #000000, 0 5px 5px rgba(0,0,0,0.3); 
            transition: 0.2s; 
            width: 100%;
        }

        /* 마우스 올렸을 때 (Hover) -> 빨간색 (#ff0000) */
        .buy-btn:hover, .buy-btn.expensive:hover {
            background: #ff0000; /* 강렬한 빨강 */
            /* 그림자도 진한 붉은색으로 변경 */
            box-shadow: 0 3px 0 #990000, 0 5px 5px rgba(0,0,0,0.5); 
        }
        
        /* 눌렀을 때 (Click) -> 움푹 들어감 */
        .buy-btn:active, .buy-btn.expensive:active { 
            transform: translateY(3px); 
            box-shadow: 0 0 0 #000000, inset 0 2px 5px rgba(0,0,0,0.2); 
        }


        .machine-bottom {
            height: 80px; background: #ccc; border-radius: 0 0 5px 5px;
            border-top: 1px solid #999;
            display: flex; align-items: center; justify-content: center;
        }
        .pickup-box {
            width: 60%; height: 50px; background: #111; border-radius: 5px;
            border-bottom: 2px solid #444; display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 14px; box-shadow: inset 0 5px 10px #000;
        }

            "box": [

                {name:"강초아 만쥬", icon:"https://firebasestorage.googleapis.com/v0/b/cheongjuca.firebasestorage.app/o/shop%2F%E1%84%80%E1%85%A1%E1%86%BC%E1%84%8E%E1%85%A9%E1%84%8B%E1%85%A1.png?alt=media&token=a4bbda20-fbfc-4847-a14b-77666f571b17"},
                {name:"강진혁 만쥬", icon:"https://firebasestorage.googleapis.com/v0/b/cheongjuca.firebasestorage.app/o/shop%2F%E1%84%80%E1%85%A1%E1%86%BC%E1%84%8C%E1%85%B5%E1%86%AB%E1%84%92%E1%85%A7%E1%86%A8.png?alt=media&token=b6813277-1750-4aba-9171-7b9d32bcd439"},

                {name:"고요한 만쥬", icon:"https://firebasestorage.googleapis.com/v0/b/cheongjuca.firebasestorage.app/o/shop%2F%E1%84%80%E1%85%A9%E1%84%8B%E1%85%AD%E1%84%92%E1%85%A1%E1%86%AB.png?alt=media&token=d6f28c98-9b96-478e-9474-d25e8cc156c1"},
                {name:"매튜 백 만쥬", icon:"https://firebasestorage.googleapis.com/v0/b/cheongjuca.firebasestorage.app/o/shop%2F%E1%84%86%E1%85%A2%E1%84%90%E1%85%B2.png?alt=media&token=eeb98b5a-992f-47b3-95ab-b65e6f237e8d"},

        };

        window.onload = function() {
            setupNav();
            if (myID) {
                database.ref('users/' + myID).on('value', (snapshot) => {
                    money = snapshot.val()?.money || 0;
                    document.getElementById('displayMoney').innerText = money.toLocaleString();
                });
            } else {
                alert("로그인이 필요합니다."); location.href = "index.html";
            }
            renderGrid();
        };

        function renderGrid() {
            const grid = document.getElementById('gridArea');
            grid.innerHTML = "";
            
            products.forEach(p => {
                let btnText = `${p.price} G`;
                let btnClass = "buy-btn";
                
                if (p.price >= 300) btnClass += " expensive"; 
                if (p.type === 'gamble') { btnText = "BETTING"; btnClass = "buy-btn expensive"; }

                grid.innerHTML += `
                    <div class="product-slot">
                        <img src="${p.icon}" class="product-icon" alt="${p.name}" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
                        
                        <div class="product-name">${p.name}</div>
                        <button class="${btnClass}" onclick="purchase('${p.name}', '${p.icon}', ${p.price}, '${p.type}', '${p.pool || ''}')">
                            ${btnText}
                        </button>
                    </div>
                `;
            });
        }

        async function purchase(name, icon, defaultPrice, type, poolName) {
            if (!myID) return alert("로그인이 필요합니다.");
            let finalPrice = defaultPrice;

            if (!isOperatingTime()) {
                alert("지금은 자판기 휴식 시간입니다. 오전 8시에 다시 와주세요!");
                return;
            }

            // 1. 도박일 경우 금액 입력 받기
            if (type === 'gamble') {
                const inputVal = prompt(`[${name}]\n보유 금액: ${money}G\n얼마를 거시겠습니까?`);
                if (inputVal === null) return; 
                finalPrice = parseInt(inputVal);
                if (isNaN(finalPrice) || finalPrice <= 0) return alert("올바른 금액을 입력하세요.");
                if (money < finalPrice) return alert("잔액이 부족합니다.");
                if (!confirm(`${finalPrice}G를 걸고 도박을 하시겠습니까?`)) return;
            } else {
                // 일반 구매 확인
                if (money < finalPrice) return alert("잔액이 부족합니다.");
                if (!confirm(`[${name}] - ${finalPrice}G\n구매하시겠습니까?`)) return;
            }

            // 돈 차감 준비
            const updates = {};
            updates[`users/${myID}/money`] = money - finalPrice;
            
            // --- 타입별 처리 로직 ---

            // A. 비밀 정보 (몰래온손님)
            if (type === 'secret') {
                const postsSnap = await database.ref('posts').once('value');
                const posts = postsSnap.val();
                if (!posts) return alert("게시글이 없습니다.");
                const keys = Object.keys(posts);
                const targetPost = posts[keys[Math.floor(Math.random() * keys.length)]];
                
                let writerName = "알 수 없음";
                const authorSnap = await database.ref('users/' + targetPost.authorID).once('value');
                
                if (authorSnap.exists()) {
                    const userData = authorSnap.val();
                    writerName = userData.nickname || userData.nick || "알 수 없음";
                }
                
                await database.ref().update(updates);
                
                if (myID !== '13reaking_news' && typeof postToMastodon === "function") {
                    await postToMastodon(`[몰래 찾아온 손님] ${myNick}님이 비밀 정보를 구매했습니다.`);
                    await postToMastodon(`[비밀 정보 공개]\n글 제목: ${targetPost.title}\n작성자: ${writerName}`);
                }
                alert(`[비밀 정보]\n글 제목: ${targetPost.title}\n작성자: ${writerName}`);
            }

            // B. 일반 아이템 (지도 포함 모든 인벤토리 저장 아이템)
            else if (type === 'item') {
                await database.ref(`users/${myID}/inventory`).push({ 
                    name: name, 
                    icon: icon, 
                    type: "소비" 
                });
                await database.ref().update(updates);

                if (myID !== '13reaking_news' && typeof postToMastodon === "function") {
                    await postToMastodon(`[자판기] ${myNick}님이 [${name}]을(를) 구매했습니다.`, icon);
                }
                alert(`덜컹! [${name}] 배출 완료! (가방을 확인하세요)`);
            }

            // C. 랜덤 뽑기 (랜덤박스, 특전키트)
            else if (type === 'random') {
                const pool = randomPools[poolName];
                const item = pool[Math.floor(Math.random() * pool.length)];
                await database.ref(`users/${myID}/inventory`).push({ name: item.name, icon: item.icon, type: "소비" });
                await database.ref().update(updates);
                
                if (myID !== '13reaking_news' && typeof postToMastodon === "function") {
                    await postToMastodon(`🎲 [뽑기] ${myNick}님이 랜덤박스에서 [${item.name}]을(를) 뽑았습니다!`, item.icon);
                }
                alert(`덜컹! 랜덤박스에서 [${item.name}] 획득!`);
            } 

            // D. 도박 결과 처리
            else if (type === 'gamble') {
                const isWin = Math.random() >= 0.5;
                let msg = "";
                
                if (isWin) {
                    updates[`users/${myID}/money`] = money + finalPrice; 
                    msg = `🎉 당첨! ${finalPrice*2}G 획득!`;
                    if (myID !== '13reaking_news' && typeof postToMastodon === "function") {
                        await postToMastodon(`🎰 [도박] ${myNick}님이 ${finalPrice}G를 걸고 승리하여 돈을 불렸습니다! (+${finalPrice}G)`);
                    }
                } else {
                    msg = `💸 꽝... 돈을 먹었습니다.`;
                    if (myID !== '13reaking_news' && typeof postToMastodon === "function") {
                        await postToMastodon(`💸 [도박] ${myNick}님이 ${finalPrice}G를 걸었지만 전액 탕진했습니다...`);
                    }
                }
                await database.ref().update(updates);
                alert(msg);
            } 

            // E. 커스텀 아이템 제작
            else if (type === 'custom') {
                const customName = prompt("원하는 악세사리 이름:");
                if (!customName) return;
                await database.ref(`users/${myID}/inventory`).push({ name: customName, icon: icon });
                await database.ref(`users/${myID}/inventory`).push({ name: customName, icon: icon });
                await database.ref().update(updates);
                
                if (myID !== '13reaking_news' && typeof postToMastodon === "function") {
                    await postToMastodon(`✨ [제작] ${myNick}님이 [${customName}]을(를) 주문 제작했습니다.`, icon);
                }
                alert(`${customName} 2개 획득!`);
            }
        }

        function setupNav() {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const menuList = document.getElementById('menuList');
            hamburgerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                menuList.style.display = (menuList.style.display === 'block') ? 'none' : 'block';
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.nav-dropdown') && !e.target.closest('#hamburgerBtn')) {
                    menuList.style.display = 'none';
                }
            });
        }
        function logout() { localStorage.clear(); location.href = "index.html"; }
    </script>
    <script src="script.js"></script>
</body>
